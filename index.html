<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Quality Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .pulse-red { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans">

    <div class="container mx-auto p-4 md:p-6">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 border-b border-slate-700 pb-5 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-sky-400">PureAir Dashboard</h1>
                <p class="text-slate-400 text-center md:text-left">Real-time Environmental Monitoring</p>
            </div>
            <div id="status-badge" class="px-4 py-2 rounded-full bg-green-500/20 text-green-400 border border-green-500">
                System Active (Simulated)
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700 text-center">
                <h2 class="text-lg font-medium mb-4 text-slate-300">Pollution Level</h2>
                <span id="pollution-value" class="text-7xl font-black mb-4 block text-white">--%</span>
                <div class="w-full h-3 bg-slate-700 rounded-full overflow-hidden">
                    <div id="progress-bar" class="h-full bg-green-500 transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>

            <div id="warning-card" class="bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700 flex flex-col justify-center items-center text-center">
                <div id="warning-icon" class="mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
                <h3 id="warning-text" class="text-xl font-bold text-slate-400">Loading...</h3>
                <p id="action-text" class="text-slate-500 mt-2 italic">Waiting for sensor data.</p>
            </div>

            <div class="bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700">
                <h2 class="text-lg font-medium mb-4 text-slate-300">Session Stats</h2>
                <div class="space-y-4">
                    <div class="flex justify-between border-b border-slate-700 pb-2"><span>Max Recorded:</span><span id="max-val" class="font-bold">0%</span></div>
                    <div class="flex justify-between border-b border-slate-700 pb-2"><span>Avg Level:</span><span id="avg-val" class="font-bold text-sky-400">0%</span></div>
                    <div class="flex justify-between pb-2"><span>Alert Count:</span><span id="alert-count" class="font-bold text-orange-400">0</span></div>
                </div>
            </div>
        </div>

        <div class="mt-8 bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700">
            <h2 class="text-lg font-medium mb-4 text-slate-300">Live Trend</h2>
            <div class="h-64">
                <canvas id="pollutionChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        const pollutionValEl = document.getElementById('pollution-value');
        const progressBar = document.getElementById('progress-bar');
        const warningCard = document.getElementById('warning-card');
        const warningText = document.getElementById('warning-text');
        const actionText = document.getElementById('action-text');
        const warningIcon = document.getElementById('warning-icon');
        
        let history = [];
        let alerts = 0;
        let currentSimulatedValue = 30; // بداية المحاكاة
        const ctx = document.getElementById('pollutionChart').getContext('2d');

        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(20).fill(''),
                datasets: [{
                    label: 'Pollution %',
                    data: [],
                    borderColor: '#38bdf8',
                    backgroundColor: 'rgba(56, 189, 248, 0.1)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { 
                    y: { min: 0, max: 100, grid: { color: '#334155' }, ticks: { color: '#94a3b8' } },
                    x: { display: false }
                },
                plugins: { legend: { display: false } }
            }
        });

        function updateDashboard() {
            // منطق المحاكاة: تغيير تدريجي
            let change = (Math.random() * 12) - 6; 
            currentSimulatedValue += change;
            if (currentSimulatedValue > 100) currentSimulatedValue = 100;
            if (currentSimulatedValue < 5) currentSimulatedValue = 5;
            
            const value = Math.round(currentSimulatedValue);
            
            pollutionValEl.innerText = value + '%';
            progressBar.style.width = value + '%';

            // الحالات والتنبيهات
            if (value > 75) {
                warningCard.className = "bg-red-900/40 p-6 rounded-2xl shadow-xl border border-red-500 pulse-red flex flex-col justify-center items-center text-center";
                warningText.innerText = "DANGER: HIGH POLLUTION";
                warningText.className = "text-xl font-bold text-red-400 uppercase";
                actionText.innerText = "WEAR A MASK IMMEDIATELY!";
                actionText.className = "text-red-200 mt-2 font-bold";
                warningIcon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>';
                if (history[history.length-1] <= 75) alerts++;
                progressBar.className = "h-full bg-red-500 transition-all duration-500";
            } else if (value > 45) {
                warningCard.className = "bg-slate-800 p-6 rounded-2xl shadow-xl border border-orange-500 flex flex-col justify-center items-center text-center";
                warningText.innerText = "Air Quality: Moderate";
                warningText.className = "text-xl font-bold text-orange-400";
                actionText.innerText = "Sensitive people should use masks.";
                actionText.className = "text-slate-400 mt-2";
                warningIcon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-orange-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>';
                progressBar.className = "h-full bg-orange-500 transition-all duration-500";
            } else {
                warningCard.className = "bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700 flex flex-col justify-center items-center text-center";
                warningText.innerText = "Air Quality: Good";
                warningText.className = "text-xl font-bold text-green-400";
                actionText.innerText = "Safe environment. No mask needed.";
                actionText.className = "text-slate-500 mt-2";
                warningIcon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>';
                progressBar.className = "h-full bg-green-500 transition-all duration-500";
            }

            history.push(value);
            if (history.length > 20) history.shift();
            chart.data.datasets[0].data = history;
            chart.update('none');

            document.getElementById('max-val').innerText = Math.max(...history) + '%';
            document.getElementById('avg-val').innerText = Math.round(history.reduce((a,b) => a+b, 0) / history.length) + '%';
            document.getElementById('alert-count').innerText = alerts;
        }

        setInterval(updateDashboard, 2000);
        updateDashboard();
    </script>
</body>
</html>
